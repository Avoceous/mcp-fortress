version: "3.9"

# MCP-Fortress full-stack deployment
# Usage: docker compose up -d

services:

  # ── MCP-Fortress Proxy ──────────────────────────────────────────────────
  mcp-fortress:
    build: .
    image: mcp-fortress:latest
    container_name: mcp-fortress-proxy
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      UPSTREAM_MCP_URL: "${UPSTREAM_MCP_URL:-http://mcp-server:3000}"
      MCPSHIELD_SIGNING_KEY: "${MCPSHIELD_SIGNING_KEY:-change-me-in-production}"
      MCPSHIELD_HOST: "0.0.0.0"
      MCPSHIELD_PORT: "8100"
      MCPSHIELD_POLICY: "/app/config/policy.yaml"
      MCPSHIELD_AUDIT_LOG: "/app/logs/audit.jsonl"
    volumes:
      - ./config/policy.yaml:/app/config/policy.yaml:ro
      - mcp-fortress-logs:/app/logs
    networks:
      - mcp-fortress-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Example: filesystem MCP server (upstream) ────────────────────────
  # Replace this with your actual MCP server
  mcp-server:
    image: node:20-alpine
    container_name: mcp-filesystem-server
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./workspace:/workspace:ro   # read-only workspace
    command: >
      npx -y @modelcontextprotocol/server-filesystem /workspace
    networks:
      - mcp-fortress-net
    expose:
      - "3000"

  # ── Audit log viewer (lightweight) ───────────────────────────────────
  log-viewer:
    image: python:3.12-slim
    container_name: mcp-fortress-logs
    restart: unless-stopped
    ports:
      - "8102:8102"
    volumes:
      - mcp-fortress-logs:/logs:ro
    command: >
      python -c "
      import http.server, os, json, pathlib
      class Handler(http.server.BaseHTTPRequestHandler):
          def do_GET(self):
              log = pathlib.Path('/logs/audit.jsonl')
              lines = log.read_text().strip().split('\n') if log.exists() else []
              entries = [json.loads(l) for l in lines[-200:] if l.strip()]
              entries.reverse()
              body = json.dumps(entries).encode()
              self.send_response(200)
              self.send_header('Content-Type','application/json')
              self.send_header('Access-Control-Allow-Origin','*')
              self.end_headers()
              self.wfile.write(body)
          def log_message(self, *a): pass
      http.server.HTTPServer(('0.0.0.0', 8102), Handler).serve_forever()
      "
    networks:
      - mcp-fortress-net

volumes:
  mcp-fortress-logs:

networks:
  mcp-fortress-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
